# This file generates the GitHub Actions matrix.
# Board names use the Zephyr HWMv2 syntax introduced in ZMK with
# Zephyr 4.1: <board>@<revision>/<soc>/<variant>. For nice!nano v2
# that is nice_nano@2.0.0/nrf52840/zmk.
---
include:
  - board: nice_nano@2.0.0/nrf52840/zmk
    shield: charybdis_left
  - board: nice_nano@2.0.0/nrf52840/zmk
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
  - board: nice_nano@2.0.0/nrf52840/zmk
    shield: settings_reset
