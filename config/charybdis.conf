# CONFIG_BT_LL_SW_LLCP_LEGACY=y

# Tighter BLE connection interval — ask the host for 7.5–15 ms instead
# of the ZMK default ~12.5–25 ms. Cuts perceived "trackball inertia"
# from delta accumulation between BLE notifications. Latency=0 means
# never skip events (pointing must not coalesce updates).
# Units are 1.25 ms, so 6 = 7.5 ms, 12 = 15 ms.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# CONFIG_BT_BUF_ACL_TX_COUNT=32
# CONFIG_BT_L2CAP_TX_BUF_COUNT=32

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Pointing subsystem (replaces deprecated CONFIG_ZMK_MOUSE on ZMK main).
# Required on both halves since the keymap with &mkp/&mmv/&msc is built
# for both sides.
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60


# 启用键盘RGB功能
CONFIG_ZMK_RGB_UNDERGLOW=y
# SPI is used on both halves: spi3 drives WS2812 RGB, and on the right
# half spi0 drives the PMW3610 trackball. Setting it in shared config
# avoids the left half losing RGB because SPI was only on right.
CONFIG_SPI=y

# Zephyr 4.1 split CONFIG_WS2812_STRIP into per-bus variants.
# nice!nano drives WS2812 over SPI3 (see charybdis.dtsi led_strip node).
CONFIG_WS2812_STRIP_SPI=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

#旋钮配置
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_KEYBOARD_NAME="GaLich 3x6"

