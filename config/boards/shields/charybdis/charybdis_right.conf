
CONFIG_PMW3610_ALT=y

# EXT_POWER framework disabled to test if the trackball stops working
# because the VCC GPIO is stuck off after settings storage corruption.
# CONFIG_ZMK_EXT_POWER=y

# Add a one-second power-up delay to ensure VCC on the breakout is
# stable before the first SPI transaction. Recommended in the
# badjeff/zmk-pmw3610-driver README for nice_nano_v2 builds.
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
