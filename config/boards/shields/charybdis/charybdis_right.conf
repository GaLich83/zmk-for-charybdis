
CONFIG_SPI=y
CONFIG_INPUT=y
# Новый pointing-API ZMK v0.3 (раньше было CONFIG_ZMK_MOUSE — старый API,
# из-за него драйвер не отдавал движение). Keymap уже на mmv/msc/mkp.
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_EXT_POWER=y

CONFIG_PMW3610=y
# nice_nano_v2 + внешнее питание: без задержки сенсор не успевает подняться
# (Incorrect product id 0xFF) и трекбол «мёртвый». 1 c гарантирует готовность VCC.
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=1000
CONFIG_PMW3610_SMART_ALGORITHM=y

# CPI и ориентация (swap-xy/invert-x/invert-y) теперь задаются в DTS-узле
# трекбола в charybdis_right.overlay, а не через CONFIG_PMW3610_*.
# Scroll/snipe/automouse в этом драйвере делаются в keymap через
# layer-based input-listener, отдельные CONFIG больше не нужны.

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
